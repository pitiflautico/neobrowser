<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NeoBrowser — AI Browser MCP Server</title>
<meta name="description" content="NeoBrowser gives your AI agent a real browser. 19 tools, one Python file."/>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "background": "#0a0a12",
        "surface-high": "#1a1a26",
        "primary": "#818cf8",
        "secondary": "#34d399",
        "tertiary": "#f472b6",
        "on-surface": "#f0f0f8",
        "on-surface-variant": "#9898aa",
      },
      fontFamily: {
        "headline": ["Space Grotesk", "sans-serif"],
        "body": ["Inter", "sans-serif"],
      },
    },
  },
}
</script>
<style>
body {
  background-color: #0a0a12;
  color: #f0f0f8;
  overflow-x: hidden;
}
.glass-panel {
  background: rgba(26, 26, 38, 0.6);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
.refraction-border {
  box-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.08);
}
.material-symbols-outlined {
  font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
}
.gradient-text {
  background: linear-gradient(135deg, #818cf8, #34d399, #f472b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
@keyframes float-slow {
  0%, 100% { transform: translateY(0px) scale(1); }
  50% { transform: translateY(-20px) scale(1.02); }
}
.float-slow { animation: float-slow 8s ease-in-out infinite; }
</style>
<script>
// Auto-redirect based on browser language
(function() {
  var lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
  if (lang.startsWith('es')) {
    window.location.replace('es/');
  } else {
    window.location.replace('en/');
  }
})();
</script>
</head>
<body class="font-body selection:bg-primary/30">

<div class="min-h-screen flex items-center justify-center px-6 relative">
  <div class="absolute inset-0 z-0">
    <div class="absolute top-1/3 left-1/4 w-[400px] h-[400px] bg-primary/15 rounded-full blur-[150px] float-slow"></div>
    <div class="absolute bottom-1/3 right-1/4 w-[300px] h-[300px] bg-secondary/10 rounded-full blur-[130px]"></div>
  </div>
  <div class="relative z-10 text-center max-w-lg">
    <div class="flex items-center justify-center gap-3 mb-8">
      <span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">public</span>
      <span class="text-3xl font-bold tracking-tighter text-on-surface font-headline">NEOBROWSER</span>
    </div>
    <p class="text-lg text-on-surface-variant mb-12">The first browser built for AI.<br/>El primer navegador creado para IA.</p>
    <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
      <a href="en/" class="w-full sm:w-48 px-8 py-4 glass-panel border border-white/10 rounded-xl font-headline font-bold text-lg text-on-surface hover:bg-white/5 hover:border-primary/30 transition-all refraction-border text-center">
        English
      </a>
      <a href="es/" class="w-full sm:w-48 px-8 py-4 glass-panel border border-white/10 rounded-xl font-headline font-bold text-lg text-on-surface hover:bg-white/5 hover:border-secondary/30 transition-all refraction-border text-center">
        Espanol
      </a>
    </div>
  </div>
</div>

</body>
</html>
