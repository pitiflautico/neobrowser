name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            bin_name: neobrowser_rs-darwin-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            bin_name: neobrowser_rs-darwin-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin_name: neobrowser_rs-linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/v3/rust

      - name: Build
        working-directory: tools/v3/rust
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp tools/v3/rust/target/${{ matrix.target }}/release/neobrowser_rs ${{ matrix.bin_name }}
          chmod +x ${{ matrix.bin_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.bin_name }}
          path: ${{ matrix.bin_name }}

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: bin/
          merge-multiple: true

      - name: Make binaries executable
        run: chmod +x bin/neobrowser_rs-*

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
