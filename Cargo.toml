[package]
name = "neobrowser_rs"
version = "0.2.0"
edition = "2021"

[dependencies]
# HTTP client — async, TLS, cookies, compression
reqwest = { version = "0.12", features = ["rustls-tls", "cookies", "gzip", "brotli", "json"] }

# HTML parser — Servo's (spec-compliant, fast)
html5ever = "0.38"
markup5ever_rcdom = "0.38.0+unofficial"
markup5ever = "0.38"

# WebSocket for raw CDP
tokio-tungstenite = { version = "0.24", features = ["native-tls"] }
futures = "0.3"

# Base64 for screenshot decoding
base64 = "0.22"

# Async runtime
tokio = { version = "1", features = ["full"] }

# CLI + serde
clap = { version = "4", features = ["derive"] }
serde_json = "1"
serde = { version = "1", features = ["derive"] }
url = "2"

# Auth & session management
keyring = { version = "3", features = ["apple-native", "linux-native"] }
totp-rs = { version = "5", features = ["gen_secret"] }
dirs = "6"
rusqlite = { version = "0.32", features = ["bundled"] }
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
rand = "0.8"

[profile.release]
opt-level = 3
lto = true
