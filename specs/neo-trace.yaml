crate: neo-trace
phase: "0.5 Tracer"
trait_interface: |
  // Tracer — observability for AI execution
  pub trait Tracer: Send + Sync {
      // AI declares intent before acting
      fn intent(&self, intent: &str, target: &str, confidence: f32);
      // Action completed
      fn action_result(&self, action_id: &str, success: bool, effect: &str, error: Option<&str>);
      // Network event with causal link
      fn network(&self, req: &HttpRequest, resp: &HttpResponse, duration_ms: u64, action_id: Option<&str>, frame_id: Option<&str>);
      // Navigation lifecycle
      fn navigation(&self, event: NavEvent, url: &str, status: Option<u16>);
      // Page state change
      fn state_change(&self, from: PageState, to: PageState, reason: &str);
      // DOM change summary (not raw mutations)
      fn dom_diff(&self, added: usize, removed: usize, changed: usize, actionable_delta: &str);
      // JS console/error
      fn console(&self, level: &str, message: &str);
      fn js_exception(&self, error: &str, stack: Option<&str>);
      // Resource blocked
      fn resource_blocked(&self, url: &str, reason: &str);
      // Export full trace
      fn export(&self) -> Vec<TraceEntry>;
      // Execution summary — what an AI reads to understand what happened
      fn summary(&self) -> ExecutionSummary;
  }

  pub enum NavEvent { Started, Committed, Finished, Failed }
  pub struct ExecutionSummary { total_actions, succeeded, failed, requests, dom_changes, errors, duration_ms, warnings }
dependencies: [neo-types, serde, serde_json, thiserror]
files_to_create:
  - src/lib.rs src/tracer.rs src/file_tracer.rs src/noop.rs src/summary.rs src/mock.rs
  - tests/tracer_test.rs tests/summary_test.rs
acceptance_criteria:
  - Tracer trait with intent/action_result/network/navigation
  - FileTracer writes JSON trace file
  - NoopTracer for tests (zero cost)
  - ExecutionSummary readable by AI
  - Correlation IDs: action_id, request_id, nav_id
  - 6+ unit tests pass
  - pipeline/validate.sh exits 0
